# Server Configuration
# Port is loaded from webserver-config.ini via ServerConfiguration
server.port=${HAVANA_PORT:80}

# Static Resources - serve from tools/www directory
spring.web.resources.static-locations=file:tools/www/
spring.web.resources.cache.period=3600

# Pebble Template Configuration
pebble.prefix=file:tools/www-tpl/default-en/
pebble.suffix=.tpl
pebble.cache=true
pebble.contentType=text/html
pebble.encoding=UTF-8

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=HAVANASESSION

# Disable Spring Boot banner
spring.main.banner-mode=off

# Logging (use existing log4j configuration)
logging.level.root=INFO
logging.level.org.alexdev=INFO
